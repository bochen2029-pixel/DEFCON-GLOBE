name: determinism

# Cross-OS determinism gate (docs/DESIGN_v1.md invariant I-4).  At every
# phase gate the per-tick state-hash trace produced by the standalone
# determinism_test binary must be byte-identical across
# {Win MSVC, macOS Clang, Linux GCC} for each of the three pinned
# scenarios.
#
# The driver under source/test/determinism_main.cpp exercises the
# invariant-critical primitives (Fixed math, sphere math, Nuke apogee
# profile, RadarGrid spherical coverage) directly without launching
# DEFCON.  This is sufficient for I-4 because those are the only
# pieces of the simulation that need bit-identity across compilers;
# the rest of World::Update is graphics/audio/network-coupled and
# wraps these primitives.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  determinism:
    name: ${{ matrix.os }} / ${{ matrix.scenario }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:       [windows-latest, macos-latest, ubuntu-latest]
        scenario: [surface, mirv, radar]
    steps:
      - uses: actions/checkout@v4

      - name: Build (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: targets/test/determinism_make
        run: make

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: targets/test/determinism_make
        # MinGW-w64 ships with windows-latest; -D__LITTLE_ENDIAN__ is
        # set in the Makefile so the same recipe works.
        run: |
          mingw32-make CXX=g++ || make CXX=g++

      - name: Run determinism trace
        shell: bash
        working-directory: targets/test/determinism_make
        run: |
          ./determinism_test ${{ matrix.scenario }} 10000 trace.out

      - name: Compare against golden trace
        shell: bash
        working-directory: targets/test/determinism_make
        run: |
          golden=../golden/${{ matrix.scenario }}.trace
          if [ ! -s "$golden" ]; then
            echo "golden trace missing at $golden" >&2
            exit 1
          fi
          diff -q trace.out "$golden"
